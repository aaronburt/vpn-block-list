name: Update Traefik VPN Blocklist

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'asn.json'
      - 'scripts/build-blocklist.sh'

permissions:
  contents: write

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Make Script Executable
        run: chmod +x scripts/build-blocklist.sh

      - name: Run Build Script
        run: ./scripts/build-blocklist.sh

      - name: Check for Changes
        id: git-diff
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-diff.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add vpn-blocklist.txt individual_blocklists/
          git commit -m "chore: auto-update VPN blocklist and ASN caches"
          git push
