name: "\U0001F41B Bug Report"
description: Report an issue with the build scripts, GitHub Actions workflows, or generation logic
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Note:** If you are reporting an incorrectly blocked IP or ASN, please use the **False Positive** issue template instead.
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is.
      placeholder: The build-blocklist.sh script fails when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command '...'
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System / Environment
      description: e.g., Ubuntu 22.04, macOS, GitHub Actions runner
